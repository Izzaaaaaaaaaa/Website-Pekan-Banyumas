openapi: 3.1.0
info:
  title: Peken Banyumasan — Kolaborator API
  version: 2.4.2
  description: |
    API consumed by the Kolaborator dashboard
    (`Peken-Banyumasan-Kolaborator/frontend/`).

    **Auth (v2.0 — Supabase):**
    - Login/logout/me/changePassword are handled **Supabase-direct** — the frontend calls
      `supabase.auth.signInWithPassword()` etc. without touching this backend.
    - `POST /api/auth/register` is **BE-intermediary** — must atomically create a Supabase Auth
      user (via Admin SDK) + insert a `kolaborators` row.
    - `PUT /api/auth/profile` (custom fields only) is **HYBRID** — frontend sends only non-Supabase
      fields (subsektor, kota, bio, etc.) here; nama/email go to Supabase directly.
    - All other endpoints require a valid **Supabase JWT** in `Authorization: Bearer <token>`.
      Backend must verify JWT using `SUPABASE_JWT_SECRET` and enforce `app_metadata.role = 'kolaborator'`.

    ---

    **Response Envelope (ALL endpoints):**
    ```
    Success: { "status": "success", "message": "<optional>", "data": <payload> }
    Error:   { "status": "error",   "message": "<human-readable>", "data": null, "errors": { "<field>": ["<msg>"] } }
    ```
    Frontend `extractData()` strips envelope — backend MUST always wrap in this shape.

    **Authentication:**
    Supabase JWT in `Authorization: Bearer <token>`.
    Backend verifies using `SUPABASE_JWT_SECRET` (HS256) or Supabase Admin SDK `getUser(token)`.
    JWT payload: `{ sub: UUID, email, app_metadata: { role: "kolaborator", status }, user_metadata: { nama } }`.
    Role enforcement: reject any request where `app_metadata.role != 'kolaborator'` with 403.
    Login/logout/me/changePassword are handled **Supabase-direct** on the frontend — this backend
    does NOT need to implement those endpoints.

    **ID Format:**
    Production: UUID v4. Mock data uses prefixed short IDs (`kol-XXXX`, `kar-XXXX`,
    `sto-XXXX`, `evkol-XXXX`, `notif-XXXX`) — frontend renders as-is.

    **Pagination:**
    Currently all endpoints return raw arrays in `data`. Pagination wrapper optional:
    `{ "data": { "items": [...], "meta": { "page": 1, "per_page": 20, "total": N, "total_pages": M } } }`
    Query params when supported: `page` (default 1), `per_page` (default 20, max 100), `q` (free-text).

    **Timezone:**
    - Timestamps: UTC ISO 8601 (`2026-04-10T08:00:00.000Z`)
    - Date-only fields (`tanggal`, `tanggal_daftar`): WIB local date `YYYY-MM-DD`
    - Time-only fields (`jam_mulai`, `jam_selesai`): WIB 24-hour `HH:MM`

    **Content Types:**
    Request body: `application/json`. All responses: `application/json`.

    **Vocabulary (CANONICAL — non-negotiable):**
    - `kolaborator` (NEVER `member`, `kreator`)
    - `artisan` (NEVER `tenant`, `umkm`)
    - `story` for author-scoped content; `aktivitas` for admin moderation (Gate only)
    - `subsektor[]` (BEKRAF 17 options) for kolaborator/event category — NOT `kategori`
    - Image fields always suffixed with `_url` (`foto_url`, `cover_url`, `gambar_url`)
    - `featured` (NOT `is_featured`)
    - Status values lowercase: `aktif`, `pending`, `suspended`, `rejected`

    **Error Catalog (messages in Bahasa Indonesia):**
    | HTTP | Scenario | Example |
    |------|----------|---------|
    | 401  | Token missing/invalid/expired | `"Sesi Anda telah berakhir"` |
    | 403  | Wrong role | `"Akses ditolak"` |
    | 404  | Not found | `"Sumber daya tidak ditemukan"` |
    | 409  | Conflict (email taken, already joined) | `"Email sudah terdaftar"` |
    | 422  | Validation error | `"Validasi gagal"` with `errors` object |
    | 500  | Server error | `"Terjadi kesalahan pada server"` |

    ---

    **Changelog:**
    - v2.1.0 (2026-05-02): C-1 Karya schema add owner_type/owner_id (required) + owner/owner_slug (computed). Synced with DB v2.1.
  contact:
    name: Peken Banyumasan Dev
  license:
    name: Private

servers:
  - url: http://localhost:8003
    description: Local backend (Kolaborator backend)
  - url: https://{space}.hf.space
    description: Production backend (REFERENCE template — HuggingFace Space example; client team may host on Render/Railway/Koyeb/Fly/etc.)
    variables:
      space:
        default: your-username-peken-kolaborator-api
        description: HuggingFace Space name (or replace `{space}.hf.space` with your team's actual backend host)

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Auth endpoints (register/OTP = BE-intermediary; profile = HYBRID; login/logout/me/password handled Supabase-direct on FE — not in this API)
  - name: kolaborator-profile
    description: Self profile (GET + PATCH /api/kolaborator/me)
  - name: kolaborator-portofolio
    description: Self portfolio items (CRUD /api/kolaborator/me/portofolio)
  - name: kolaborator-story
    description: Self stories (CRUD /api/kolaborator/me/story)
  - name: kolaborator-events
    description: Event listing + self-join requests (read + POST to kolaborator-requests)
  - name: notifikasi
    description: Per-user notification inbox

paths:
  # ── Auth (BE endpoints only) ────────────────────────────────────────────────

  /api/auth/register:
    post:
      operationId: registerKolaborator
      tags: [auth]
      summary: Register new kolaborator account (BE-intermediary)
      description: |
        Atomically creates a Supabase Auth user (via Admin SDK with
        `app_metadata.role='kolaborator'` and `app_metadata.status='pending'`)
        + inserts a `kolaborators` row in the database.
        Account cannot login until admin approves via `PATCH /api/kolaborator/:id/status`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterKolaboratorBody'
            example:
              role: kolaborator
              nama: Sari Wulandari
              email: sari@example.com
              password: RahasiaKuat123!
              kota: Purwokerto
              subsektor: [Kriya, Fashion]
              bio: Desainer tekstil dengan 7 tahun pengalaman
      responses:
        '200':
          description: Registration successful — pending admin approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Registrasi berhasil, menunggu moderasi admin
                data:
                  message: Registrasi berhasil, menunggu moderasi admin
                  status: pending
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/auth/profile:
    put:
      operationId: updateKolaboratorProfile
      tags: [auth]
      summary: Update custom profile fields (HYBRID — custom fields only)
      description: |
        Updates **custom** profile fields stored in the `kolaborators` table.
        `nama` and `email` are NOT accepted here — they are updated via
        `supabase.auth.updateUser()` on the frontend directly.
        Backend identifies user from JWT `sub` (UUID).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileBody'
            example:
              subsektor: [Kriya, Fashion, Musik]
              kota: Purwokerto
              bio: Desainer tekstil & musisi lokal
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Profile berhasil diupdate
                data:
                  id: kol-0001
                  email: sari@example.com
                  nama: Sari Wulandari
                  role: kolaborator
                  status: aktif
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/auth/otp/request:
    post:
      operationId: requestOtp
      tags: [auth]
      summary: Request OTP via WhatsApp (BE-intermediary, STUB)
      description: |
        **STUB — not yet implemented.** Frontend throws 'Not implemented yet'.
        When ready: BE sends OTP via Fonnte/Twilio WA gateway.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: '6282192058122'
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: OTP terkirim
                data: null
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/auth/otp/verify:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and get reset token (BE-intermediary, STUB)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                otp:
                  type: string
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: OTP valid
                data:
                  reset_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/password/reset:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with reset token (BE-intermediary, STUB)
      description: BE calls `auth.admin.updateUserById(userId, { password })` via Supabase Admin SDK.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reset_token:
                  type: string
                password_baru:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Password berhasil direset
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Kolaborator Self-Profile ────────────────────────────────────────────────

  /api/kolaborator/me:
    get:
      operationId: getKolaboratorMe
      tags: [kolaborator-profile]
      summary: Get own kolaborator profile
      responses:
        '200':
          description: Self kolaborator record
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Kolaborator'
              example:
                status: success
                message: null
                data:
                  id: kol-0001
                  slug: sari-wulandari
                  nama: Sari Wulandari
                  email: sari@example.com
                  kota: Purwokerto
                  bio: Desainer tekstil
                  foto_url: null
                  cover_url: null
                  subsektor: [Kriya, Fashion]
                  status: aktif
                  tanggal_daftar: '2026-01-15'
                  total_karya: 5
                  total_story: 3
                  total_event: 2
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      operationId: patchKolaboratorMe
      tags: [kolaborator-profile]
      summary: Update own kolaborator profile
      description: |
        Allowed fields: `nama, email, kota, bio, foto_url, cover_url, subsektor`.
        NOT allowed: `status, total_*, tanggal_daftar`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchKolaboratorBody'
            example:
              kota: Purwokerto
              bio: Desainer tekstil & fotografer
              subsektor: [Kriya, Fashion, Fotografi]
      responses:
        '200':
          description: Updated kolaborator record
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Kolaborator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Kolaborator Portofolio ──────────────────────────────────────────────────

  /api/kolaborator/me/portofolio:
    get:
      operationId: listKolaboratorPortofolio
      tags: [kolaborator-portofolio]
      summary: List own portfolio items
      responses:
        '200':
          description: Karya array
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Karya'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createKolaboratorPortofolio
      tags: [kolaborator-portofolio]
      summary: Create a new portfolio item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKaryaBody'
            example:
              judul: Tenun Ikat Banyumas
              subsektor: Kriya
              deskripsi: Kain tenun ikat motif lokal
              tahun: 2025
              gambar_url: https://storage.example.com/karya/new.jpg
              featured: false
      responses:
        '200':
          description: Created karya item
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Karya'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/kolaborator/me/portofolio/{id}:
    patch:
      operationId: patchKolaboratorPortofolio
      tags: [kolaborator-portofolio]
      summary: Update own portfolio item (partial)
      description: Returns 404 if item not owned by current user.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchKaryaBody'
      responses:
        '200':
          description: Updated karya
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Karya'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteKolaboratorPortofolio
      tags: [kolaborator-portofolio]
      summary: Delete own portfolio item
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Item portofolio dihapus
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Kolaborator Story ───────────────────────────────────────────────────────

  /api/kolaborator/me/story:
    get:
      operationId: listKolaboratorStory
      tags: [kolaborator-story]
      summary: List own stories (author-scoped)
      responses:
        '200':
          description: Story array
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Story'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createKolaboratorStory
      tags: [kolaborator-story]
      summary: Publish a new story
      description: Stories are immutable post-publish — no PATCH. Delete sets status='dihapus' (soft-delete).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStoryBody'
            example:
              konten: Mengikuti workshop batik di Yogyakarta minggu ini
              media_url: https://storage.example.com/media/story-0001.jpg
              tags: [workshop, batik, yogyakarta]
      responses:
        '200':
          description: Created story
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Story'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/kolaborator/me/story/{id}:
    delete:
      operationId: deleteKolaboratorStory
      tags: [kolaborator-story]
      summary: Delete own story (soft-delete — sets status='dihapus')
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Soft-deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Story dihapus
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Events (Kolaborator consumer slice) ────────────────────────────────────

  /api/events:
    get:
      operationId: listEventsKolaborator
      tags: [kolaborator-events]
      summary: List events (scoped to published/berlangsung for kolaborator)
      description: |
        Backend scopes to `status IN ('published', 'berlangsung')` for kolaborator role.
        Returns all events the kolaborator can browse and join.
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Free-text search
        - name: status
          in: query
          schema:
            type: string
            enum: [published, berlangsung]
      responses:
        '200':
          description: Event list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/events/{id}:
    get:
      operationId: getEventKolaborator
      tags: [kolaborator-events]
      summary: Get event detail (includes kolaborator's own request status if any)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Event detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/events/{id}/kolaborator-requests:
    post:
      operationId: requestJoinEvent
      tags: [kolaborator-events]
      summary: Request to join an event (self-join → pending approval)
      description: |
        Creates a `kolaborator_request` row with `status: 'pending'` and `assigned_by: 'self'`.
        Admin responds via `PATCH /api/events/:id/kolaborator-requests/:rid` (Gate backend).
        Default `peran: 'peserta'` if not specified.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                peran:
                  type: string
                  enum: [peserta, performer, panitia]
                  default: peserta
            example:
              peran: peserta
      responses:
        '200':
          description: Request created with pending status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Permintaan bergabung terkirim, menunggu persetujuan admin
                data:
                  id: evkol-0001
                  status: pending
                  peran: peserta
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/events/my-requests:
    get:
      operationId: listMyEventRequests
      tags: [kolaborator-events]
      summary: List own event join request history
      responses:
        '200':
          description: Self join request history
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            event_id:
                              type: string
                            peran:
                              type: string
                            status:
                              type: string
                              enum: [pending, approved, rejected]
              example:
                status: success
                message: null
                data:
                  - event_id: evt-0001
                    peran: peserta
                    status: pending
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Notifikasi (Shared) ─────────────────────────────────────────────────────

  /api/notifikasi:
    get:
      operationId: listNotifikasi
      tags: [notifikasi]
      summary: List per-user notifications (sorted DESC by created_at)
      responses:
        '200':
          description: Notification list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Notifikasi'
              example:
                status: success
                message: null
                data:
                  - id: notif-0001
                    type: event_invite
                    title: Undangan Event
                    message: Anda disetujui bergabung di Peken #7
                    read: false
                    link: /events/evt-0001
                    detail: null
                    created_at: '2026-04-29T10:00:00.000Z'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/notifikasi/{id}/baca:
    patch:
      operationId: bacaNotifikasi
      tags: [notifikasi]
      summary: Mark a notification as read
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Notifikasi ditandai sudah dibaca
                data:
                  id: notif-0001
                  read: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/notifikasi/baca-semua:
    patch:
      operationId: bacaSemuaNotifikasi
      tags: [notifikasi]
      summary: Mark all notifications as read
      responses:
        '200':
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Semua notifikasi ditandai sudah dibaca
                data:
                  count: 5
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Supabase JWT (RS256). Issued by `supabase.auth.signInWithPassword()` on the frontend.
        Backend verifies using `SUPABASE_JWT_SECRET`. Role must be 'kolaborator' in `app_metadata.role`.

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource UUID or prefixed short ID
      example: kol-0001
    SlugPath:
      name: slug
      in: path
      required: true
      schema:
        type: string
      description: URL-safe slug (lowercase + hyphen)
      example: sari-wulandari

  responses:
    Unauthorized:
      description: Missing, invalid, or expired Supabase JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            status: error
            message: Sesi Anda telah berakhir
            data: null
    Forbidden:
      description: Authenticated but role does not match
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            status: error
            message: Akses ditolak
            data: null
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            status: error
            message: Sumber daya tidak ditemukan
            data: null
    Conflict:
      description: Conflict (e.g. email taken, already joined)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            status: error
            message: Email sudah terdaftar
            data: null
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            status: error
            message: Validasi gagal
            data: null
            errors:
              email: [wajib diisi]
              subsektor: [minimal 1 subsektor dipilih]

  schemas:
    Envelope:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
          example: success
        message:
          type: string
          nullable: true
          description: Optional human-readable message
          example: null
        data:
          description: Actual payload — shape varies per endpoint

    ErrorEnvelope:
      type: object
      required: [status, message, data]
      properties:
        status:
          type: string
          enum: [error]
          example: error
        message:
          type: string
          description: Human-readable error message (Bahasa Indonesia)
          example: Terjadi kesalahan
        data:
          type: object
          nullable: true
          example: null
        errors:
          type: object
          nullable: true
          description: Field-level validation errors (422 only)
          additionalProperties:
            type: array
            items:
              type: string

    RegisterKolaboratorBody:
      type: object
      required: [role, nama, email, password, kota, subsektor]
      properties:
        role:
          type: string
          enum: [kolaborator]
          description: Must be 'kolaborator' — backend rejects 'admin'/'artisan'
          example: kolaborator
        nama:
          type: string
          minLength: 2
          description: Full name
          example: Sari Wulandari
        email:
          type: string
          format: email
          example: sari@example.com
        password:
          type: string
          minLength: 8
          example: RahasiaKuat123!
        kota:
          type: string
          description: City of residence
          example: Purwokerto
        subsektor:
          type: array
          items:
            type: string
          minItems: 1
          description: |
            BEKRAF 17 subsectors. Valid values: Aplikasi & Game Developer, Arsitektur,
            Desain Interior, Desain Komunikasi Visual, Desain Produk, Fashion,
            Film Animasi & Video, Fotografi, Kriya, Kuliner, Musik, Penerbitan,
            Periklanan, Seni Pertunjukan, Seni Rupa, Televisi & Radio, atau sesuai kebutuhan lokal.
          example: [Kriya, Fashion]
        bio:
          type: string
          description: Short biography
          example: Desainer tekstil dengan 7 tahun pengalaman

    UpdateProfileBody:
      type: object
      description: |
        Custom profile fields only. nama/email are NOT accepted here — they are
        updated via `supabase.auth.updateUser()` on the frontend directly.
      properties:
        subsektor:
          type: array
          items:
            type: string
          description: BEKRAF 17 subsectors
          example: [Kriya, Fashion, Musik]
        kota:
          type: string
          example: Purwokerto
        bio:
          type: string
          example: Desainer tekstil & musisi lokal
        foto_url:
          type: string
          nullable: true
          example: https://storage.example.com/foto/kol-0001.jpg
        cover_url:
          type: string
          nullable: true
          example: null

    PatchKolaboratorBody:
      type: object
      description: |
        Partial update — all fields optional.
        Allowed: nama, email, kota, bio, foto_url, cover_url, subsektor.
        NOT allowed: status, total_*, tanggal_daftar (server rejects these).
      properties:
        nama:
          type: string
          example: Sari Wulandari
        email:
          type: string
          format: email
          example: sari@example.com
        kota:
          type: string
          example: Purwokerto
        bio:
          type: string
          example: Desainer tekstil & fotografer
        foto_url:
          type: string
          nullable: true
          example: https://storage.example.com/foto/kol-0001.jpg
        cover_url:
          type: string
          nullable: true
          example: null
        subsektor:
          type: array
          items:
            type: string
          example: [Kriya, Fashion, Fotografi]

    Kolaborator:
      type: object
      required: [id, slug, nama, email, kota, bio, subsektor, status, tanggal_daftar]
      description: |
        Kolaborator record as seen by the kolaborator portal. Admin-only fields (no_hp, internal_notes)
        are intentionally absent from this schema — they only appear in openapi-gate.yaml Kolaborator schema.
        Asymmetric by design: portal must not expose admin-collected data.
      properties:
        id:
          type: string
          description: UUID v4 (production) or prefixed short ID (mock)
          example: kol-0001
        slug:
          type: string
          description: URL-safe, generated from nama via slugify()
          example: sari-wulandari
        nama:
          type: string
          example: Sari Wulandari
        email:
          type: string
          format: email
          example: sari@example.com
        kota:
          type: string
          example: Purwokerto
        bio:
          type: string
          example: Desainer tekstil dengan 7 tahun pengalaman
        foto_url:
          type: string
          nullable: true
          example: https://storage.example.com/foto/kol-0001.jpg
        cover_url:
          type: string
          nullable: true
          example: null
        subsektor:
          type: array
          items:
            type: string
          description: BEKRAF 17 subsectors array
          example: [Kriya, Fashion]
        status:
          type: string
          enum: [aktif, pending, suspended, rejected]
          example: aktif
        tanggal_daftar:
          type: string
          format: date
          description: WIB local date YYYY-MM-DD
          example: '2026-01-15'
        total_karya:
          type: integer
          description: Computed by DB trigger — do not set manually
          example: 5
        total_story:
          type: integer
          description: Computed by DB trigger — do not set manually
          example: 3
        total_event:
          type: integer
          description: Computed by DB trigger — do not set manually
          example: 2

    Karya:
      type: object
      required: [id, judul, subsektor, deskripsi, tahun, featured, owner_type, owner_id]
      properties:
        id:
          type: string
          example: kar-0001
        judul:
          type: string
          description: Portfolio item title
          example: Batik Geometrik Banyumas
        subsektor:
          type: string
          description: SINGULAR string (NOT array). BEKRAF subsektor.
          example: Kriya
        deskripsi:
          type: string
          example: Motif batik kontemporer terinspirasi arsitektur lokal
        tahun:
          type: integer
          description: Year of creation
          example: 2024
        gambar_url:
          type: string
          nullable: true
          description: Image URL (always _url suffix)
          example: https://storage.example.com/karya/kar-0001.jpg
        featured:
          type: boolean
          description: Admin-toggled featured flag. NOT 'is_featured'.
          example: true
        owner_type:
          type: string
          enum: [artisan, kolaborator]
          description: Polymorphic owner type — points to artisans.id OR kolaborators.id.
          example: kolaborator
        owner_id:
          type: string
          description: UUID of owning artisan or kolaborator (resolves via owner_type).
          example: kol-0001
        owner:
          type: string
          description: Display name of owner (joined from artisans.nama_usaha or kolaborators.nama). Backend computes on read.
          example: Sari Wulandari
        owner_slug:
          type: string
          description: Slug of owner for navigation to /profile/{slug} (joined from artisans.slug or kolaborators.slug).
          example: sari-wulandari
        created_at:
          type: string
          format: date-time
          description: UTC ISO 8601, set on INSERT
          example: '2026-04-01T08:00:00.000Z'
        updated_at:
          type: string
          format: date-time
          description: UTC ISO 8601, auto-set by set_updated_at trigger on UPDATE
          example: '2026-04-15T10:30:00.000Z'

    CreateKaryaBody:
      type: object
      required: [judul, subsektor, deskripsi, tahun]
      properties:
        judul:
          type: string
          example: Tenun Ikat Banyumas
        subsektor:
          type: string
          description: BEKRAF subsektor (singular string)
          example: Kriya
        deskripsi:
          type: string
          example: Kain tenun ikat motif lokal
        tahun:
          type: integer
          example: 2025
        gambar_url:
          type: string
          nullable: true
          example: https://storage.example.com/karya/new.jpg
        featured:
          type: boolean
          default: false
          example: false

    PatchKaryaBody:
      type: object
      description: Partial update — all fields optional
      properties:
        judul:
          type: string
        subsektor:
          type: string
        deskripsi:
          type: string
        tahun:
          type: integer
        gambar_url:
          type: string
          nullable: true
        featured:
          type: boolean

    Story:
      type: object
      required: [id, konten, tags, like_count, status, created_at]
      properties:
        id:
          type: string
          example: sto-0001
        konten:
          type: string
          description: Story text content
          example: Mengikuti workshop batik di Yogyakarta
        media_url:
          type: string
          nullable: true
          description: Optional attached media URL
          example: null
        tags:
          type: array
          items:
            type: string
          description: Free-form tags
          example: [workshop, batik]
        like_count:
          type: integer
          description: Number of likes (computed)
          example: 12
        status:
          type: string
          enum: [aktif, dihapus, disembunyikan]
          description: Delete sets status='dihapus' (soft-delete)
          example: aktif
        created_at:
          type: string
          format: date-time
          description: UTC ISO 8601. NOT 'tanggal'.
          example: '2026-04-01T08:00:00.000Z'

    CreateStoryBody:
      type: object
      required: [konten]
      description: Stories are immutable post-publish — no PATCH endpoint. Delete sets status='dihapus'.
      properties:
        konten:
          type: string
          minLength: 1
          example: Mengikuti workshop batik di Yogyakarta minggu ini
        media_url:
          type: string
          nullable: true
          example: https://storage.example.com/media/story-0001.jpg
        tags:
          type: array
          items:
            type: string
          default: []
          example: [workshop, batik, yogyakarta]

    Event:
      type: object
      required: [id, nama, tanggal, tanggal_selesai, jam_mulai, jam_selesai, lokasi, status, deskripsi, subsektor]
      description: |
        FE derives 'upcoming' from `status === 'published' && tanggal > now`.
        Backend MUST NOT store or return 'upcoming' as a status value.
      properties:
        id:
          type: string
          example: evt-0001
        nama:
          type: string
          description: Event name/title
          example: Peken Banyumas #7
        tanggal:
          type: string
          format: date
          description: Start date (WIB local date YYYY-MM-DD)
          example: '2026-05-10'
        tanggal_selesai:
          type: string
          format: date
          description: End date (WIB local date YYYY-MM-DD)
          example: '2026-05-12'
        jam_mulai:
          type: string
          description: WIB 24-hour HH:MM
          example: '09:00'
        jam_selesai:
          type: string
          description: WIB 24-hour HH:MM
          example: '21:00'
        lokasi:
          type: string
          example: Alun-alun Purwokerto
        status:
          type: string
          enum: [draft, published, berlangsung, selesai]
          description: |
            Raw stored status — returned AS-IS (backend must NOT rename
            published to 'upcoming'). Kolaborator only sees
            published/berlangsung/selesai via this API.
          example: published
        status_efektif:
          type: string
          enum: [published, berlangsung, selesai]
          description: |
            Backend-derived display status (v2.4.2, hybrid decision 2026-05-24):
            'selesai' if status='selesai' OR tanggal < today;
            'berlangsung' if status='berlangsung' OR tanggal = today;
            else raw status. DB keeps the raw value — this field is computed
            per-request, never stored. FE renders from status_efektif with
            fallback to status.
          example: berlangsung
        kapasitas:
          type: integer
          description: Maximum capacity
          example: 5000
        peserta_count:
          type: integer
          description: Current participant count (computed)
          example: 42
        deskripsi:
          type: string
          example: Pameran kreatif terbesar di Banyumas
        konten_lengkap:
          type: string
          nullable: true
          description: Long-form event content
        subsektor:
          type: array
          items:
            type: string
          description: BEKRAF subsektor categories featured at the event
          example: [Kriya, Fashion, Kuliner]
        banner_url:
          type: string
          nullable: true
          example: https://storage.example.com/events/evt-0001-banner.jpg
        galeri:
          type: array
          items:
            type: string
          description: Array of gallery image URLs
        terdaftar:
          type: boolean
          default: false
          description: |
            True when the logged-in kolaborator is an approved participant
            (row in event_kolaborators). Enriched per-request in GET /api/events.
          example: false
        request_status:
          type: string
          nullable: true
          enum: [pending, approved, null]
          description: |
            This kolaborator's join-request state for the event:
            'pending' (awaiting admin), 'approved' (== terdaftar), or null
            (none / rejected — rejected rows are hard-deleted, so re-apply is allowed).
          example: pending

    Notifikasi:
      type: object
      required: [id, type, title, message, read, created_at]
      properties:
        id:
          type: string
          example: notif-0001
        type:
          type: string
          description: |
            Kolaborator type taxonomy: event_invite, event_starting_soon, karya_featured, system.
            Safe to add new types without FE changes — FE renders generically via title/message/link.
          example: event_invite
        title:
          type: string
          description: Notification title
          example: Undangan Event
        message:
          type: string
          description: Notification body text
          example: Anda disetujui bergabung di Peken #7
        read:
          type: boolean
          description: Read status. Field name is 'read' — NOT 'dibaca'.
          example: false
        link:
          type: string
          nullable: true
          description: FE deep-link path (e.g. /events/evt-0001)
          example: /events/evt-0001
        detail:
          type: object
          nullable: true
          description: Optional structured payload for type-specific rendering
          example: null
        created_at:
          type: string
          format: date-time
          description: UTC ISO 8601
          example: '2026-04-29T10:00:00.000Z'
