<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #f2f4e8; padding: 20px; margin: 0; font-family: 'Montserrat', sans-serif; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stat-card { background: #fff; border: 1px solid #e4e7d4; border-radius: 16px; padding: 14px; box-shadow: 0 1px 3px rgba(30,32,16,.06); }
  .stat-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .stat-label { font-size: 12px; font-weight: 600; color: #5a6040; }
  .stat-meta { font-size: 10px; color: #8a9070; margin-top: 3px; }
  .stat-icon { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .stat-value { font-size: 28px; font-weight: 700; color: #1e2010; line-height: 1; }
  .green  { background: #eef4eb; color: #7A9B6A; }
  .red    { background: #f7eeee; color: #B87272; }
  .amber  { background: #f7f2e4; color: #C4A24D; }
  .indigo { background: #eeeef8; color: #7A80B0; }
</style>
</head>
<body>
<div class="grid">
  <div class="stat-card">
    <div class="stat-top">
      <div><div class="stat-label">Sedang di Dalam</div><div class="stat-meta">Live</div></div>
      <div class="stat-icon green">👥</div>
    </div>
    <div class="stat-value">128</div>
  </div>
  <div class="stat-card">
    <div class="stat-top">
      <div><div class="stat-label">Tap Masuk</div><div class="stat-meta">Hari ini</div></div>
      <div class="stat-icon green">↓</div>
    </div>
    <div class="stat-value">342</div>
  </div>
  <div class="stat-card">
    <div class="stat-top">
      <div><div class="stat-label">Tap Keluar</div><div class="stat-meta">Hari ini</div></div>
      <div class="stat-icon red">↑</div>
    </div>
    <div class="stat-value">214</div>
  </div>
  <div class="stat-card">
    <div class="stat-top">
      <div><div class="stat-label">Kunjungan Hari Ini</div><div class="stat-meta">Event aktif</div></div>
      <div class="stat-icon indigo">📅</div>
    </div>
    <div class="stat-value">342</div>
  </div>
</div>
</body>
</html>
