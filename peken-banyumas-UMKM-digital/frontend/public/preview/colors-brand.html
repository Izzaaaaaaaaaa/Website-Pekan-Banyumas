<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Montserrat', sans-serif; background: #f2f4e8; padding: 20px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { border-radius: 8px; overflow: hidden; width: 100px; }
  .swatch-color { height: 60px; }
  .swatch-info { background: #fff; padding: 6px 8px; border: 1px solid #e4e7d4; border-top: none; border-radius: 0 0 8px 8px; }
  .swatch-name { font-size: 10px; font-weight: 600; color: #1e2010; }
  .swatch-hex { font-size: 9px; color: #8a9070; font-family: monospace; margin-top: 2px; }
  .group-label { font-size: 10px; font-weight: 700; color: #5a6040; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; margin-top: 16px; }
  .group-label:first-child { margin-top: 0; }
</style>
</head>
<body>
  <div class="group-label">Sage (Brand Accent)</div>
  <div class="row">
    <div class="swatch"><div class="swatch-color" style="background:#f0f2e4"></div><div class="swatch-info"><div class="swatch-name">Pale</div><div class="swatch-hex">#f0f2e4</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#dde3c0"></div><div class="swatch-info"><div class="swatch-name">Light</div><div class="swatch-hex">#dde3c0</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#C3CA96"></div><div class="swatch-info"><div class="swatch-name">Sage ★</div><div class="swatch-hex">#C3CA96</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#a8b07a"></div><div class="swatch-info"><div class="swatch-name">Mid</div><div class="swatch-hex">#a8b07a</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#7a8a52"></div><div class="swatch-info"><div class="swatch-name">Dark</div><div class="swatch-hex">#7a8a52</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#4f5c30"></div><div class="swatch-info"><div class="swatch-name">Deeper</div><div class="swatch-hex">#4f5c30</div></div></div>
  </div>
  <div class="group-label">Ink / Neutral (Company Profile)</div>
  <div class="row">
    <div class="swatch"><div class="swatch-color" style="background:#1B1B1B; border:1px solid #333"></div><div class="swatch-info"><div class="swatch-name">Charcoal</div><div class="swatch-hex">#1B1B1B</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#111111; border:1px solid #333"></div><div class="swatch-info"><div class="swatch-name">Carbon</div><div class="swatch-hex">#111111</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#0D0D0D; border:1px solid #333"></div><div class="swatch-info"><div class="swatch-name">Ink</div><div class="swatch-hex">#0D0D0D</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#B2B2B2"></div><div class="swatch-info"><div class="swatch-name">Mist</div><div class="swatch-hex">#B2B2B2</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#5B5B5B"></div><div class="swatch-info"><div class="swatch-name">Smoke</div><div class="swatch-hex">#5B5B5B</div></div></div>
    <div class="swatch"><div class="swatch-color" style="background:#FFFFFF; border:1px solid #e4e7d4"></div><div class="swatch-info"><div class="swatch-name">White</div><div class="swatch-hex">#FFFFFF</div></div></div>
  </div>
</body>
</html>
