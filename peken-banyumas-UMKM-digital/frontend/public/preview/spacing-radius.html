<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #f2f4e8; padding: 20px; margin: 0; font-family: 'Montserrat', sans-serif; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .label { font-size: 9px; font-weight: 700; color: #8a9070; text-transform: uppercase; letter-spacing: .06em; min-width: 70px; }
  .bar { height: 8px; background: #7a8a52; border-radius: 4px; }
  .val { font-size: 10px; font-weight: 600; color: #5a6040; min-width: 30px; }
  .sect { font-size: 9px; font-weight: 700; color: #5a6040; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; margin-top: 14px; }
  .sect:first-child { margin-top: 0; }
  .r-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .r-box { width: 52px; text-align: center; }
  .r-demo { background: #fff; border: 1.5px solid #c8ccb0; margin-bottom: 4px; height: 36px; }
  .r-label { font-size: 9px; color: #8a9070; font-weight: 600; }
</style>
</head>
<body>
<div class="sect">Spacing Scale</div>
<div class="row"><span class="label">sp-1 / 4px</span><div class="bar" style="width:4px"></div><span class="val">4</span></div>
<div class="row"><span class="label">sp-2 / 8px</span><div class="bar" style="width:8px"></div><span class="val">8</span></div>
<div class="row"><span class="label">sp-3 / 12px</span><div class="bar" style="width:12px"></div><span class="val">12</span></div>
<div class="row"><span class="label">sp-4 / 16px</span><div class="bar" style="width:16px"></div><span class="val">16</span></div>
<div class="row"><span class="label">sp-5 / 20px</span><div class="bar" style="width:20px"></div><span class="val">20</span></div>
<div class="row"><span class="label">sp-6 / 24px</span><div class="bar" style="width:24px"></div><span class="val">24</span></div>
<div class="row"><span class="label">sp-7 / 32px</span><div class="bar" style="width:32px"></div><span class="val">32</span></div>
<div class="row"><span class="label">sp-8 / 40px</span><div class="bar" style="width:40px"></div><span class="val">40</span></div>
<div class="row"><span class="label">sp-9 / 48px</span><div class="bar" style="width:48px"></div><span class="val">48</span></div>
<div class="row"><span class="label">sp-10 / 64px</span><div class="bar" style="width:64px"></div><span class="val">64</span></div>

<div class="sect">Border Radius</div>
<div class="r-row">
  <div class="r-box"><div class="r-demo" style="border-radius:0px"></div><div class="r-label">r-0 / CP</div></div>
  <div class="r-box"><div class="r-demo" style="border-radius:5px"></div><div class="r-label">r-sm / 5</div></div>
  <div class="r-box"><div class="r-demo" style="border-radius:12px"></div><div class="r-label">r-md / 12</div></div>
  <div class="r-box"><div class="r-demo" style="border-radius:16px"></div><div class="r-label">r-lg / 16</div></div>
  <div class="r-box"><div class="r-demo" style="border-radius:20px"></div><div class="r-label">r-xl / 20</div></div>
  <div class="r-box"><div class="r-demo" style="border-radius:9999px"></div><div class="r-label">pill</div></div>
</div>
</body>
</html>
