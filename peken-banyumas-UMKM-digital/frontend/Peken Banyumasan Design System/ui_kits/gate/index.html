/* ── Shared small components ── */
const Badge = ({ variant = 'success', children }) => {
  const variants = {
    success: { bg: 'var(--success-bg)', color: 'var(--success)', border: 'var(--success-bd)' },
    error:   { bg: 'var(--error-bg)',   color: 'var(--error)',   border: 'var(--error-bd)' },
    warning: { bg: 'var(--warning-bg)', color: 'var(--warning)', border: 'var(--warning-bd)' },
    info:    { bg: 'var(--info-bg)',     color: 'var(--info)',    border: '#b0c8d8' },
    exit:    { bg: 'var(--exit-bg)',     color: 'var(--exit)',    border: 'var(--exit-bd)' },
    sage:    { bg: '#eef0e0',            color: 'var(--sage-deeper)', border: '#c8d09a' },
    pulse:   { bg: 'var(--success-bg)', color: 'var(--success)', border: 'var(--success-bd)' },
  };
  const v = variants[variant] || variants.success;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      padding: '2px 9px', borderRadius: 9999, fontSize: 10, fontWeight: 700,
      background: v.bg, color: v.color, border: `1px solid ${v.border}`,
      fontFamily: 'Montserrat, sans-serif',
    }}>{children}</span>
  );
};

const Card = ({ children, style = {} }) => (
  <div style={{
    background: 'var(--surface)', border: '1px solid var(--border)',
    borderRadius: 16, boxShadow: '0 1px 3px rgba(30,32,16,.06)',
    ...style
  }}>{children}</div>
);

const Btn = ({ children, variant = 'primary', size = 'md', onClick, disabled, style = {} }) => {
  const base = {
    fontFamily: 'Montserrat, sans-serif', fontWeight: 600, cursor: 'pointer',
    border: 'none', display: 'inline-flex', alignItems: 'center', gap: 6,
    transition: 'background .15s, opacity .15s', borderRadius: 20,
    padding: size === 'sm' ? '6px 14px' : '10px 22px',
    fontSize: size === 'sm' ? 11 : 13,
  };
  const variants = {
    primary: { background: 'var(--sage-dark)', color: '#fff' },
    ghost:   { background: 'transparent', color: 'var(--sage-dark)', border: '1.5px solid #c8d09a' },
    danger:  { background: 'var(--error)', color: '#fff' },
    warning: { background: 'var(--warning)', color: '#fff' },
  };
  return (
    <button style={{ ...base, ...variants[variant], opacity: disabled ? .6 : 1, ...style }}
      onClick={onClick} disabled={disabled}>{children}</button>
  );
};

/* ── LOGIN PAGE ── */
const LoginPage = ({ onLogin }) => {
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [showPass, setShowPass] = useState(false);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const handle = (e) => {
    e.preventDefault();
    setLoading(true); setErr('');
    setTimeout(() => {
      if (email && pass) { onLogin(); }
      else { setErr('Email atau password salah. Silakan coba lagi.'); setLoading(false); }
    }, 800);
  };

  return (
    <div style={{ display: 'flex', minHeight: '100vh', background: '#f2f4e8', fontFamily: 'Montserrat, sans-serif' }}>
      {/* Left branding panel */}
      <div style={{
        width: '48%', background: '#1B1B1B', display: 'flex', flexDirection: 'column',
        justifyContent: 'space-between', padding: '48px 56px', position: 'relative', overflow: 'hidden',
      }}>
        {/* Subtle dot pattern */}
        <div style={{
          position: 'absolute', inset: 0, opacity: .07,
          backgroundImage: 'radial-gradient(rgba(195,202,150,0.8) 1.5px, transparent 1.5px)',
          backgroundSize: '28px 28px',
        }} />
        {/* Sage accent blobs */}
        <div style={{ position: 'absolute', top: -80, right: -80, width: 300, height: 300, borderRadius: '50%', background: 'rgba(195,202,150,.08)', filter: 'blur(60px)' }} />
        <div style={{ position: 'absolute', bottom: -60, left: -60, width: 280, height: 280, borderRadius: '50%', background: 'rgba(122,138,82,.1)', filter: 'blur(50px)' }} />

        {/* Logo */}
        <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', gap: 12 }}>
          <img src="../../assets/logo-gate.png" alt="logo" style={{ width: 44, height: 44, borderRadius: 11, objectFit: 'cover', boxShadow: '0 4px 12px rgba(0,0,0,.4)' }} />
          <div>
            <div style={{ fontSize: 18, fontWeight: 700, color: '#fff', letterSpacing: '.02em' }}>Peken Banyumasan</div>
            <div style={{ fontSize: 11, color: '#C3CA96', fontWeight: 500 }}>Sistem Manajemen Event</div>
          </div>
        </div>

        <div style={{ position: 'relative', zIndex: 1 }}>
          <div style={{ fontSize: 32, fontWeight: 700, color: '#fff', lineHeight: 1.3, marginBottom: 16, maxWidth: 380 }}>
            Kelola pengunjung event dengan lebih cerdas.
          </div>
          <p style={{ fontSize: 14, color: '#8a9278', lineHeight: 1.7, maxWidth: 360 }}>
            Pantau data real-time, kelola pengunjung dan optimalkan operasional event Peken Banyumasan dalam satu platform terintegrasi.
          </p>
        </div>

        {/* Pixel skyline accent */}
        <div style={{ position: 'relative', zIndex: 1 }}>
          <div style={{ display: 'flex', gap: 4, marginBottom: 16 }}>
            {[...Array(8)].map((_,i) => (
              <div key={i} style={{ width: 16, height: [20,32,24,40,20,36,28,20][i], background: i % 2 === 0 ? 'rgba(195,202,150,.6)' : 'rgba(195,202,150,.25)', borderRadius: '3px 3px 0 0' }} />
            ))}
          </div>
          <div style={{ fontSize: 11, color: '#3a4030' }}>© 2026 Panitia Peken Banyumasan. All rights reserved.</div>
        </div>
      </div>

      {/* Right form */}
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '48px 56px' }}>
        <div style={{ width: '100%', maxWidth: 400 }}>
          <div style={{ marginBottom: 36 }}>
            <div style={{ fontSize: 26, fontWeight: 700, color: 'var(--text-1)', marginBottom: 6 }}>Selamat Datang</div>
            <div style={{ fontSize: 13, color: 'var(--text-3)' }}>Silakan masuk ke akun admin atau petugas Anda.</div>
          </div>

          {err && (
            <div style={{ marginBottom: 18, padding: '12px 16px', background: 'var(--error-bg)', border: '1px solid var(--error-bd)', borderRadius: 12, color: 'var(--error)', fontSize: 12 }}>
              {err}

          )}

          <form onSubmit={handle} style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
            {/* Email */}

              <label style={{ fontSize: 12, fontWeight: 700, color: 'var(--text-2)', display: 'block', marginBottom: 7 }}>Email Address</label>
              <div style={{ position: 'relative' }}>
                <div style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-3)' }}>

                    fontFamily: 'Montserrat, sans-serif', fontSize: 13, color: 'var(--text-1)',

                  style={{ position: 'absolute', right: 14, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-3)', padding: 0 }}>
                  <Icon d={showPass ? icons.eyeOff : icons.eye} size={15} color="currentColor" />
                </button>
              </div>
            </div>

            <button type="submit" disabled={loading} style={{
              width: '100%', background: 'var(--sage-dark)', color: '#fff',
              border: 'none', borderRadius: 14, padding: '13px 20px',
              fontFamily: 'Montserrat, sans-serif', fontWeight: 700, fontSize: 13,
              cursor: loading ? 'not-allowed' : 'pointer', opacity: loading ? .75 : 1,
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              boxShadow: '0 4px 14px rgba(122,138,82,.28)', transition: 'background .15s',

            <div style={{ fontSize: 11, color: 'var(--text-3)', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
              <Icon d={icons.shield} size={13} color="var(--text-3)" />

            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── ADMIN LAYOUT ── */
const AdminLayout = ({ page, setPage, onLogout }) => (
  <div style={{ display: 'flex', minHeight: '100vh', background: 'var(--sage-pale)', fontFamily: 'Montserrat, sans-serif' }}>
    <Sidebar page={page} setPage={setPage} role="admin" onLogout={onLogout} />
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <Header page={page} />
      <div style={{ flex: 1, overflowY: 'auto', padding: 24 }}>
        {page === 'dashboard' ? <DashboardPage /> : <PlaceholderPage page={page} />}
      </div>
    </div>
  </div>
);

/* ── ROOT APP ── */
const App = () => {
  const stored = localStorage.getItem('peken_gate_page') || 'login';
  const [screen, setScreen] = useState(stored);
  const [dashPage, setDashPage] = useState('dashboard');

  useEffect(() => {
    localStorage.setItem('peken_gate_page', screen);
  }, [screen]);

  const handleLogin = () => setScreen('app');
  const handleLogout = () => setScreen('login');
  const handleSetPage = (p) => setDashPage(p);

  if (screen === 'login') return <LoginPage onLogin={handleLogin} />;
  return <AdminLayout page={dashPage} setPage={handleSetPage} onLogout={handleLogout} />;
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "sidebarDark": true,
  "accentColor": "#7a8a52",
  "bgColor": "#f2f4e8"
}/*EDITMODE-END*/;

// Tweaks panel
const TweaksPanel = ({ visible, tweaks, setTweaks }) => {
  if (!visible) return null;
  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
      background: '#fff', border: '1px solid var(--border)', borderRadius: 16,
      boxShadow: '0 8px 28px rgba(30,32,16,.14)', padding: 20, width: 240,
      fontFamily: 'Montserrat, sans-serif',
    }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-1)', marginBottom: 14, textTransform: 'uppercase', letterSpacing: '.06em' }}>Tweaks</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        <div>
          <label style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-2)', display: 'block', marginBottom: 5 }}>Accent Color</label>
          <input type="color" value={tweaks.accentColor}
            onChange={e => { const v = e.target.value; setTweaks(t => ({...t, accentColor:v})); document.documentElement.style.setProperty('--sage-dark', v); window.parent.postMessage({type:'__edit_mode_set_keys', edits:{accentColor:v}}, '*'); }}
            style={{ width: '100%', height: 32, border: '1px solid var(--border)', borderRadius: 8, cursor: 'pointer' }} />
        </div>
        <div>
          <label style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-2)', display: 'block', marginBottom: 5 }}>Page Background</label>
          <input type="color" value={tweaks.bgColor}
            onChange={e => { const v = e.target.value; setTweaks(t => ({...t, bgColor:v})); document.documentElement.style.setProperty('--sage-pale', v); window.parent.postMessage({type:'__edit_mode_set_keys', edits:{bgColor:v}}, '*'); }}
            style={{ width: '100%', height: 32, border: '1px solid var(--border)', borderRadius: 8, cursor: 'pointer' }} />
        </div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <label style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-2)' }}>Dark Sidebar</label>
          <input type="checkbox" checked={tweaks.sidebarDark}
            onChange={e => setTweaks(t => ({...t, sidebarDark: e.target.checked}))} />
        </div>
      </div>
    </div>
  );
};

const Root = () => {
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    // Apply saved tweaks
    if (tweaks.accentColor) document.documentElement.style.setProperty('--sage-dark', tweaks.accentColor);
    if (tweaks.bgColor) document.documentElement.style.setProperty('--sage-pale', tweaks.bgColor);
  }, []);

  useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  return (
    <>
      <style>{`
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        button:hover { filter: brightness(.95); }
      `}</style>
      <App />
      <TweaksPanel visible={tweaksVisible} tweaks={tweaks} setTweaks={setTweaks} />
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
