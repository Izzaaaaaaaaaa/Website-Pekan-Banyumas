                  count: 8
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Supabase JWT (RS256). Issued by `supabase.auth.signInWithPassword()` on the frontend.
        Backend verifies using `SUPABASE_JWT_SECRET`.
        Role must be 'admin' OR 'petugas' in `app_metadata.role`.
        Endpoints marked "admin only" additionally reject role 'petugas' with 403.

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource UUID or prefixed short ID
      example: evt-0001

  responses:
    Unauthorized:
      description: Missing, invalid, or expired Supabase JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            status: error
            message: Sesi Anda telah berakhir
            data: null
    Forbidden:
      description: Authenticated but role insufficient (e.g. petugas accessing admin-only endpoint)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            status: error
            message: Akses ditolak
            data: null
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            status: error
            message: Sumber daya tidak ditemukan
            data: null
    Conflict:
      description: Conflict (e.g. stand already occupied)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            status: error
            message: Stand sudah ditempati artisan lain
            data: null
    BadRequest:
      description: Bad request — missing required parameter
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            status: error
            message: Validasi gagal
            data: null
            errors:
              status: [nilai tidak valid]

  schemas:
    Envelope:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        message:
          type: string
          nullable: true
        data:
          description: Actual payload — shape varies per endpoint

    ErrorEnvelope:
      type: object
      required: [status, message, data]
      properties:
        status:
          type: string
          enum: [error]
        message:
          type: string
        data:
          type: object
          nullable: true
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    Stats:
      type: object
      required: [di_dalam, total_masuk, total_keluar, total_harian]
      properties:
        di_dalam:
          type: integer
          description: Currently inside venue
          example: 127
        total_masuk:
          type: integer
          description: Total entries today
          example: 450
        total_keluar:
          type: integer
          description: Total exits today
          example: 323
        total_harian:
          type: integer
          description: Unique visitors today
          example: 450
        event_id:
          type: string
          nullable: true
          description: Active event ID (null if no active event)
          example: evt-0001
        nama_event:
          type: string
          nullable: true
          description: Active event name
          example: Peken Banyumas #7

    Visitor:
      type: object
      required: [id, nama, waktu_masuk, status]
      properties:
        id:
          type: string
          example: vis-0001
        nama:
          type: string
          description: Visitor name (from NFC/manual entry)
          example: Dewi Lestari
        waktu_masuk:
          type: string
          format: date-time
          description: UTC ISO 8601
          example: '2026-04-28T02:30:00.000Z'
        waktu_keluar:
          type: string
          format: date-time
          nullable: true
          description: UTC ISO 8601 (null if still inside)
          example: null
        status:
          type: string
          enum: [di_dalam, keluar]
          example: di_dalam

    VisitorReportRow:
      type: object
      description: |
        One visitor row in GET /api/reports. tipe_pengunjung, nama_kolaborator
        and durasi_menit are computed at read time (NFC ⇔ uid present; duration
        = keluar − masuk) — not stored columns.
      required: [id, nama, tipe_pengunjung, waktu_masuk, status]
      properties:
        id:
          type: string
          example: vis-0001
        nama:
          type: string
          example: Dewi Lestari
        nama_kolaborator:
          type: string
          nullable: true
          description: Name shown for NFC visitors; null for manual entries
          example: Dewi Lestari
        tipe_pengunjung:
          type: string
          enum: [nfc, manual]
          example: nfc
        waktu_masuk:
          type: string
          format: date-time
          description: UTC ISO 8601
          example: '2026-04-28T02:30:00.000Z'
