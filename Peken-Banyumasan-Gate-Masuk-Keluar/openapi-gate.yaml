            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Karya'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/kolaborator/{id}/portofolio/{pid}:
    patch:
      operationId: featureKolaboratorPorto
      tags: [kolaborator-management]
      summary: Toggle featured flag on portfolio item (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: pid
