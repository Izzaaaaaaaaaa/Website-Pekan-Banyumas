          in: query
          schema:
            type: string
      responses:
        '200':
          description: Kolaborator list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Kolaborator'
        '401':
