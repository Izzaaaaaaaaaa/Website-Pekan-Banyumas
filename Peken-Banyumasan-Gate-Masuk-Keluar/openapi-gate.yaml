openapi: 3.1.0
info:
  title: Peken Banyumasan — Gate (Admin & Petugas) API
  version: 2.4.1
  description: |
    API consumed by the Gate admin/petugas panel
    (`Peken-Banyumasan-Gate-Masuk-Keluar/frontend/`).

    **Auth (v2.0 — Supabase):**
    - Login/logout/me/changePassword are **Supabase-direct** — frontend calls
      `supabase.auth.signInWithPassword()` etc. without touching this backend.
    - Gate has **no self-register** — admin and petugas accounts are created by superadmin.
    - `PUT /api/auth/profile` (custom fields only) is **HYBRID**.
    - All other endpoints require a valid **Supabase JWT** in `Authorization: Bearer <token>`.
      Backend verifies using `SUPABASE_JWT_SECRET` and enforces `app_metadata.role IN ('admin', 'petugas')`.
    - Endpoints exclusive to `role: admin` are noted in their summary. Petugas is limited to
      dashboard, visitor scan, and basic event/zone read.

    **Vocabulary (CANONICAL — non-negotiable):**
    - `kolaborator` (NEVER member, kreator)
    - `artisan` (NEVER tenant, umkm)
    - `aktivitas` for admin-moderation story feed (NEVER admin/stories)
    - Path segment `/kolaborator` singular (NEVER `/kolaborators`)
    - Path segment `/artisan` singular (NEVER `/artisans`)

    ---

    **Response Envelope (ALL endpoints except binary file downloads):**
    ```
    Success: { "status": "success", "message": "<optional>", "data": <payload> }
    Error:   { "status": "error",   "message": "<human-readable>", "data": null, "errors": { "<field>": ["<msg>"] } }
    ```
    Frontend `extractData()` strips envelope — backend MUST always wrap in this shape.

    **Authentication:**
    Supabase JWT in `Authorization: Bearer <token>`.
    Backend verifies using `SUPABASE_JWT_SECRET` (HS256) or Supabase Admin SDK `getUser(token)`.
    JWT payload: `{ sub: UUID, email, app_metadata: { role: "admin"|"petugas", status }, user_metadata: { nama } }`.
    Role enforcement: reject any request where `app_metadata.role NOT IN ('admin', 'petugas')` with 403.
    Login/logout/me/changePassword are handled **Supabase-direct** on the frontend — this backend
    does NOT need to implement those endpoints.

    **ID Format:**
    Production: UUID v4. Mock data uses prefixed short IDs (`evt-XXXX`, `kol-XXXX`,
    `art-XXXX`, `kar-XXXX`, `vis-XXXX`, `notif-XXXX`) — frontend renders as-is.

    **Pagination:**
    Currently all endpoints return raw arrays in `data`. Pagination wrapper optional:
    `{ "data": { "items": [...], "meta": { "page": 1, "per_page": 20, "total": N, "total_pages": M } } }`
    Query params when supported: `page` (default 1), `per_page` (default 20, max 100), `q` (free-text),
    `from`/`to` (date range filter, YYYY-MM-DD), `status` (enum filter).

    **Timezone:**
    - Timestamps: UTC ISO 8601 (`2026-04-10T08:00:00.000Z`)
    - Date-only fields (`tanggal`, `tanggal_selesai`): WIB local date `YYYY-MM-DD`
    - Time-only fields (`jam_mulai`, `jam_selesai`): WIB 24-hour `HH:MM`

    **Content Types:**
    - Default: `application/json`
    - Uploads (banner, galeri, QRIS images): `multipart/form-data`
    - Report exports: `application/vnd.openxmlformats-officedocument.spreadsheetml.sheet` (XLSX) or `text/csv`

    **Error messages** are in Bahasa Indonesia — frontend displays them as-is via toast.

    **Error Catalog:**
    | HTTP | Scenario | Example message |
    |------|----------|-----------------|
    | 400  | Invalid params / malformed body | `"Parameter 'page' harus berupa angka"` |
    | 401  | Missing/expired JWT | `"Token tidak valid atau sudah kedaluwarsa"` |
    | 403  | Wrong role / insufficient privilege | `"Anda tidak memiliki akses untuk fitur ini"` |
    | 404  | Resource not found | `"Data tidak ditemukan"` |
    | 409  | Duplicate / conflict | `"Email sudah terdaftar"` |
    | 422  | Validation error (field-level) | `"Field 'nama' wajib diisi"` |
    | 429  | Rate limit exceeded | `"Terlalu banyak permintaan, coba lagi nanti"` |
    | 500  | Server error | `"Terjadi kesalahan pada server"` |

    ---

    **Changelog:**
    - v2.1.0 (2026-05-02): G-1 Kolaborator schema add no_hp+internal_notes (admin-only); G-2 Artisan schema add internal_notes (admin-only); G-3 Artisan schema add username (required); G-4 patchKolaborator requestBody expanded; G-5 patchArtisan requestBody expanded; G-6 Karya schema add owner_type/owner_id (required) + owner/owner_slug (computed) — mirrors CP-1/C-1 for cross-spec consistency. Synced with DB v2.1.
  contact:
    name: Peken Banyumasan Dev
  license:
    name: Private

servers:
  - url: http://localhost:8001
    description: Local backend (Gate backend)
  - url: https://{space}.hf.space
    description: Production backend (REFERENCE template — HuggingFace Space example; client team may host on Render/Railway/Koyeb/Fly/etc.)
    variables:
      space:
        default: your-username-peken-gate-api
        description: HuggingFace Space name (or replace `{space}.hf.space` with your team's actual backend host)

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Auth (HYBRID profile update — custom fields only; login/logout/me/changePassword handled Supabase-direct on FE)
  - name: dashboard
    description: Dashboard stats, visitor list, NFC tap, manual entry
  - name: reports
    description: Visitor reports, artisan reports, event accumulation, export
  - name: events-crud
    description: Event CRUD + status change (admin only)
  - name: events-kolaborator
    description: Admin event–kolaborator assignments + self-join request approval
  - name: events-artisan
    description: Admin event–artisan assignments + artisan-request approval + stand assignment
  - name: kolaborator-management
    description: Admin CRUD of kolaborator records (status, porto, stories)
  - name: artisan-management
    description: Admin read of artisan records + finance (read-only)
  - name: aktivitas
    description: Admin moderation of all kolaborator stories (cross-author)
  - name: company-profile
    description: Company profile section management (per-section JSONB)
  - name: zones
    description: Venue zone layout management
  - name: notifikasi
    description: Admin notification inbox

paths:
  # ── Auth ─────────────────────────────────────────────────────────────────────

  /api/auth/profile:
    put:
      operationId: updateAdminProfile
      tags: [auth]
      summary: Update custom profile fields (HYBRID — custom fields only)
      description: |
        Updates custom fields in `users_profile` table. `nama` and `email` are handled by
        `supabase.auth.updateUser()` on the FE. Backend identifies user from JWT `sub`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Custom fields (not nama/email)
              additionalProperties: true
            example:
              jabatan: Koordinator Gate
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Dashboard ─────────────────────────────────────────────────────────────────

  /api/dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get live visitor stats (admin + petugas)
      description: Returns current event visitor counts. Live data — suitable for polling.
      responses:
        '200':
          description: Dashboard stats
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Stats'
              example:
                status: success
                message: null
                data:
                  di_dalam: 143
                  total_masuk: 312
                  total_keluar: 169
                  total_harian: 312
                  event_id: evt-0001
                  nama_event: Peken Banyumas #7
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/visitors:
    get:
      operationId: listVisitors
      tags: [dashboard]
      summary: List visitors (filterable by date + event)
      parameters:
        - name: tanggal
          in: query
          schema:
            type: string
            format: date
          description: Filter by date (WIB YYYY-MM-DD)
          example: '2026-05-10'
        - name: event_id
          in: query
          schema:
            type: string
          description: Filter by event ID
      responses:
        '200':
          description: Visitor list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Visitor'
              example:
                status: success
                message: null
                data:
                  - id: vis-0001
                    nama: Bapak Joko
                    waktu_masuk: '2026-05-10T09:15:00.000Z'
                    waktu_keluar: null
                    status: di_dalam
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/visitors/manual:
    post:
      operationId: manualVisitorEntry
      tags: [dashboard]
      summary: Manual visitor entry (admin + petugas)
      description: Manual masuk/keluar entry without NFC tap.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [aksi]
              properties:
                aksi:
                  type: string
                  enum: [masuk, keluar]
                event_id:
                  type: string
                  nullable: true
            example:
              aksi: masuk
              event_id: evt-0001
      responses:
        '200':
          description: Entry recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Pengunjung berhasil dicatat masuk
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/visitors/tap:
    post:
      operationId: visitorTap
      tags: [dashboard]
      summary: NFC tap visitor entry (admin + petugas)
      description: |
        Processes NFC UID tap. Backend determines masuk/keluar based on current status.
        Returns visitor record with resolved action.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uid, timestamp]
              properties:
                uid:
                  type: string
                  description: NFC card UID
                  example: 04:AB:CD:EF
                timestamp:
                  type: string
                  format: date-time
                  description: Client timestamp (UTC ISO 8601)
            example:
              uid: 04:AB:CD:EF
              timestamp: '2026-05-10T09:15:00.000Z'
      responses:
        '200':
          description: Tap processed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          aksi:
                            type: string
                            enum: [masuk, keluar]
                          nama:
                            type: string
                          status:
                            type: string
              example:
                status: success
                message: Selamat datang, Bapak Joko!
                data:
                  aksi: masuk
                  nama: Bapak Joko
                  status: di_dalam
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Reports ───────────────────────────────────────────────────────────────────

  /api/reports:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get visitor report for an event/date (admin only)
      parameters:
        - name: event_id
          in: query
          schema:
            type: string
        - name: tanggal
          in: query
          schema:
            type: string
            format: date
          example: '2026-05-10'
      responses:
        '200':
          description: Visitor report
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          nama:
                            type: string
                          tanggal_range:
                            type: array
                            items:
                              type: string
                          rows:
                            type: array
                            items:
                              $ref: '#/components/schemas/VisitorReportRow'
                          ringkasan:
                            type: object
                            properties:
                              total_kunjungan:
                                type: integer
                              total_nfc:
                                type: integer
                              total_manual:
                                type: integer
                          total_masuk:
                            type: integer
                          total_keluar:
                            type: integer
                          di_dalam:
                            type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/reports/export:
    get:
      operationId: exportReport
      tags: [reports]
      summary: Export visitor report as binary file (admin only)
      description: |
        Returns a binary file (xlsx or pdf).
        Backend MUST set `Content-Disposition: attachment; filename="..."`.
        Frontend triggers download via Blob object URL.
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [excel, pdf]
          example: excel
        - name: event_id
          in: query
          schema:
            type: string
        - name: tanggal
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Binary file download
          headers:
            Content-Disposition:
              schema:
                type: string
              example: 'attachment; filename="laporan-peken-7.xlsx"'
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/reports/artisan:
    get:
      operationId: getArtisanReport
      tags: [reports]
      summary: Get artisan revenue report (admin only)
      parameters:
        - name: event_id
          in: query
          schema:
            type: string
          description: Filter by event (optional — all events if omitted)
      responses:
        '200':
          description: Artisan report rows
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ArtisanReportRow'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/reports/accumulation:
    get:
      operationId: getAccumulationReport
      tags: [reports]
      summary: Get event accumulation report (admin only)
      parameters:
        - name: event_id
          in: query
          schema:
            type: string
          description: Filter by event (optional — all events if omitted)
      responses:
        '200':
          description: Event accumulation rows
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/EventAccumRow'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── Events CRUD ──────────────────────────────────────────────────────────────

  /api/events:
    get:
      operationId: listEvents
      tags: [events-crud]
      summary: List all events (admin sees all statuses)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published, berlangsung, selesai]
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Event list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createEvent
      tags: [events-crud]
      summary: Create new event (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventBody'
            example:
              nama: Peken Banyumas #8
              tanggal: '2026-08-10'
              tanggal_selesai: '2026-08-12'
              jam_mulai: '09:00'
              jam_selesai: '21:00'
              lokasi: Alun-alun Purwokerto
              status: draft
              kapasitas: 500
              deskripsi: Pameran kreatif terbesar ke-8
              konten_lengkap: '...'
              subsektor: [Kriya, Fashion, Kuliner]
              banner_url: null
              galeri: []
      responses:
        '200':
          description: Created event
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/events/{id}:
    get:
      operationId: getEvent
      tags: [events-crud]
      summary: Get event detail (admin sees all statuses)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Event detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateEvent
      tags: [events-crud]
      summary: Full update event (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventBody'
      responses:
        '200':
          description: Updated event
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteEvent
      tags: [events-crud]
      summary: Delete event (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Event dihapus
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/events/{id}/status:
    patch:
      operationId: patchEventStatus
      tags: [events-crud]
      summary: Change event status (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [draft, published, berlangsung, selesai]
            example:
              status: published
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                          status:
                            type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Events ↔ Kolaborator (Admin Assignment) ───────────────────────────────────

  /api/events/{id}/kolaborator:
    get:
      operationId: listEventKolaborator
      tags: [events-kolaborator]
      summary: List kolaborators assigned to event (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: EventKolaborator list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/EventKolaborator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: assignKolaboratorToEvent
      tags: [events-kolaborator]
      summary: Admin-assign kolaborator to event (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kolaborator_id, peran]
              properties:
                kolaborator_id:
                  type: string
                peran:
                  type: string
                  enum: [performer, panitia, peserta]
                status_kehadiran:
                  type: string
                  enum: [terdaftar, hadir, tidak_hadir, dibatalkan]
                  default: terdaftar
            example:
              kolaborator_id: kol-0001
              peran: performer
              status_kehadiran: terdaftar
      responses:
        '200':
          description: Assigned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/EventKolaborator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/events/{id}/kolaborator/{kid}:
    patch:
      operationId: updateEventKolaborator
      tags: [events-kolaborator]
      summary: Update kolaborator assignment in event (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: kid
          in: path
          required: true
          schema:
            type: string
          description: EventKolaborator junction ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                peran:
                  type: string
                status_kehadiran:
                  type: string
                  enum: [terdaftar, hadir, tidak_hadir, dibatalkan]
            example:
              status_kehadiran: hadir
      responses:
        '200':
          description: Updated assignment
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/EventKolaborator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: removeEventKolaborator
      tags: [events-kolaborator]
      summary: Remove kolaborator from event (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: kid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Kolaborator dihapus dari event
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/events/{id}/kolaborator-requests:
    get:
      operationId: listKolaboratorRequests
      tags: [events-kolaborator]
      summary: List pending kolaborator self-join requests (admin only)
      description: Returns requests with status='pending'. Submitted via Kolaborator app.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Pending kolaborator requests
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/KolaboratorRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/events/{id}/kolaborator-requests/{rid}:
    patch:
      operationId: respondKolaboratorRequest
      tags: [events-kolaborator]
      summary: Approve or reject a kolaborator self-join request (admin only)
      description: |
        **Side effects on approve:**
        - Insert `event_kolaborator` row with `assigned_by: 'self'`, `status_kehadiran: 'terdaftar'`
        - Emit notification to kolaborator (`type: 'event_invite'`)
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: rid
          in: path
          required: true
          schema:
            type: string
          description: KolaboratorRequest ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [approve, reject]
            example:
              action: approve
      responses:
        '200':
          description: Request responded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Permintaan disetujui
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Events ↔ Artisan (Admin Assignment) ──────────────────────────────────────

  /api/events/{id}/artisan:
    get:
      operationId: listEventArtisan
      tags: [events-artisan]
      summary: List artisans assigned to event (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: EventArtisan list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/EventArtisan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: assignArtisanToEvent
      tags: [events-artisan]
      summary: Admin-assign artisan to event (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artisan_id]
              properties:
                artisan_id:
                  type: string
                stand_id:
                  type: string
                  nullable: true
                  description: Concrete zone stand (validated against the event's zones)
                posisi_event:
                  type: string
                  nullable: true
                  description: Free-text position label (e.g. "Zona A - Stand 5"); falls back to stand_id when omitted
                status_request:
                  type: string
                  enum: [approved]
                  default: approved
            example:
              artisan_id: art-0001
              posisi_event: Zona A - Stand 5
              status_request: approved
      responses:
        '200':
          description: Assigned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/EventArtisan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/events/{id}/artisan/{aid}:
    patch:
      operationId: updateEventArtisan
      tags: [events-artisan]
      summary: Update artisan assignment in event (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: aid
          in: path
          required: true
          schema:
            type: string
          description: EventArtisan junction ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stand_id:
                  type: string
                  nullable: true
                posisi_event:
                  type: string
                  nullable: true
                status_request:
                  type: string
                  enum: [pending, pending_change, approved, rejected]
            example:
              stand_id: B-2
              status_request: approved
      responses:
        '200':
          description: Updated assignment
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/EventArtisan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: removeEventArtisan
      tags: [events-artisan]
      summary: Remove artisan from event (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: aid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Artisan dihapus dari event
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/events/{id}/artisan-requests:
    get:
      operationId: listArtisanRequests
      tags: [events-artisan]
      summary: List pending/pending_change artisan self-join requests (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Artisan requests
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ArtisanRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/events/{id}/artisan-requests/{rid}:
    patch:
      operationId: respondArtisanRequest
      tags: [events-artisan]
      summary: Approve or reject initial artisan join request (admin only)
      description: |
        Responds to initial `requestJoin` (step 1 of the artisan-request flow).
        **Side effects on approve:**
        - Insert/update `event_artisan` row with `status_request: 'approved'`, `stand_id` assigned
        - Mark zone stand `occupied: true`
        - Emit notification to artisan (`type: 'artisan_request_approved'`)
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: rid
          in: path
          required: true
          schema:
            type: string
          description: ArtisanRequest ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [approve, reject]
                stand_id:
                  type: string
                  description: Required when action='approve'
                  example: A-3
            example:
              action: approve
              stand_id: A-3
      responses:
        '200':
          description: Request responded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Permintaan artisan disetujui
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/events/{id}/artisan-requests/{rid}/change:
    patch:
      operationId: respondPositionChange
      tags: [events-artisan]
      summary: Approve or reject artisan stand-change request (admin only)
      description: |
        Responds to `requestPositionChange` (step 3 of artisan-request flow).
        **Side effects on approve:**
        - Update existing `event_artisan.stand_id` to `change_request` value
        - Emit notification to artisan (`type: 'position_change_approved'`)
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: rid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [approve, reject]
            example:
              action: approve
      responses:
        '200':
          description: Position change responded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Perubahan posisi disetujui
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Kolaborator Management ────────────────────────────────────────────────────

  /api/kolaborator:
