                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Notifikasi'
              example:
                status: success
                message: null
                data:
                  - id: notif-0001
                    type: artisan_request
                    title: Permintaan Artisan Baru
                    message: Batik Budi ingin bergabung di event Peken #7
                    read: false
                    link: /events/evt-0001/artisan-requests
                    detail: null
                    created_at: '2026-04-29T10:00:00.000Z'
        '401':
