        '200':
          description: Kolaborator record
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Kolaborator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchKolaborator
      tags: [kolaborator-management]
      summary: Admin update kolaborator record (admin only)
      description: |
        Admin can edit: nama, email, kota, bio, foto_url, cover_url, subsektor, no_hp, internal_notes.
        NOT status (use /status endpoint) — status is exclusively managed via /api/kolaborator/{id}/status.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nama:
                  type: string
                email:
                  type: string
                  format: email
                  description: Updates kolaborators.email mirror; backend MUST also update auth.users.
                kota:
                  type: string
                bio:
                  type: string
                no_hp:
                  type: string
                  description: Admin-collected; backend stores in kolaborators.no_hp.
                subsektor:
                  type: array
                  items:
                    type: string
                foto_url:
                  type: string
                  nullable: true
                cover_url:
                  type: string
                  nullable: true
                internal_notes:
                  type: string
            example:
              bio: Desainer tekstil terbaik Banyumas
              no_hp: '081111223344'
              internal_notes: Verified via WhatsApp 2026-04-12.
      responses:
        '200':
          description: Updated kolaborator
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Kolaborator'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/kolaborator/{id}/status:
    patch:
      operationId: patchKolaboratorStatus
      tags: [kolaborator-management]
      summary: Update kolaborator status (admin only)
      description: |
        **Dual update required:** Both `app_metadata.status` in Supabase Auth (via Admin SDK)
        AND `status` field in `kolaborators` table must be updated atomically.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [aktif, suspended, rejected]
            example:
              status: aktif
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                          status:
                            type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/kolaborator/{id}/events:
    get:
      operationId: listKolaboratorEvents
      tags: [kolaborator-management]
      summary: List events a kolaborator has joined (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
