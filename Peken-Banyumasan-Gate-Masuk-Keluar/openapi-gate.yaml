  # ── Petugas Management ───────────────────────────────────────────────────────

  /api/petugas:
    get:
      operationId: listPetugas
      tags: [petugas-management]
      summary: List all petugas (admin only)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [aktif, disabled]
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Petugas list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Petugas'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createPetugas
      tags: [petugas-management]
      summary: Create new petugas account (admin only)
      description: |
        Creates Supabase Auth user with `app_metadata.role = 'petugas'` and
        inserts a `users_profile` row via the existing `trg_sync_user_role` trigger.
        The trigger handles the users_profile insert — backend only needs to call
        Supabase Auth Admin `createUser`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nama, email, password]
              properties:
                nama:
                  type: string
                  example: Budi Santoso
                email:
                  type: string
                  format: email
                  example: budi@pekenbanyumasan.id
                password:
                  type: string
                  format: password
                  minLength: 8
                  description: Initial password — petugas should change via /settings after first login.
                jabatan:
                  type: string
                  nullable: true
                  example: Petugas Pengunjung
      responses:
        '201':
          description: Petugas created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Petugas'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/petugas/{id}:
    get:
      operationId: getPetugas
      tags: [petugas-management]
      summary: Get petugas detail (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Petugas record
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Petugas'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchPetugas
      tags: [petugas-management]
      summary: Update petugas profile — nama, jabatan, email (admin only)
      description: |
        Admin can edit: nama, jabatan, email.
        NOT status (use /status endpoint) — status is exclusively managed via
        /api/petugas/{id}/status.
        Email update requires backend to also update auth.users.email.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nama:
                  type: string
                jabatan:
                  type: string
                  nullable: true
                email:
                  type: string
                  format: email
                  description: Updates users_profile.email mirror; backend MUST also update auth.users.
            example:
              nama: Budi Santoso
              jabatan: Koordinator Pintu Masuk
      responses:
        '200':
          description: Updated petugas
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Petugas'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/petugas/{id}/status:
    patch:
      operationId: patchPetugasStatus
      tags: [petugas-management]
      summary: Enable or disable petugas account (admin only)
      description: |
        Disable: sets `banned_until = '2099-12-31T23:59:59Z'` in Supabase Auth
        (native Auth pattern — no DB column needed).
        Enable: sets `banned_until = null`.
        Disabled petugas cannot log in; their users_profile row is preserved.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [aktif, disabled]
            example:
              status: disabled
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                          status:
                            type: string
                            enum: [aktif, disabled]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/petugas/{id}/reset-password:
    post:
      operationId: resetPetugasPassword
      tags: [petugas-management]
      summary: Admin-trigger password reset for petugas (admin only)
      description: |
        Two modes:
        - `email_link`: Supabase Auth sends a reset-link email to the petugas.
          Response returns a confirmation message only (no secret exposed).
        - `temp_password`: Backend generates a secure random password, sets it
          via Admin SDK, and returns it **once** in the response for the admin
          to relay to the petugas. The petugas should change it immediately
          via `/settings`.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [email_link, temp_password]
            example:
              mode: temp_password
      responses:
        '200':
          description: Password reset initiated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                            description: Present for mode=email_link
                          temp_password:
                            type: string
                            description: Present for mode=temp_password — one-time display only
              examples:
                email_link:
                  value:
                    status: success
                    message: Link reset password telah dikirim
                    data:
                      message: Link reset password telah dikirim ke email petugas.
                temp_password:
                  value:
                    status: success
                    message: Password sementara berhasil dibuat
                    data:
                      temp_password: Xk7!mR2qP9
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Artisan Management ────────────────────────────────────────────────────────

  /api/artisan:
    get:
      operationId: listArtisan
      tags: [artisan-management]
      summary: List all artisans (admin only)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [aktif, pending, suspended, rejected]
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Artisan list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Artisan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/artisan/{id}:
    get:
      operationId: getArtisan
      tags: [artisan-management]
      summary: Get artisan detail (admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Artisan record
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Artisan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchArtisan
      tags: [artisan-management]
      summary: Admin update artisan record (admin only — can edit komisi_persen)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                komisi_persen:
                  type: number
                  minimum: 0
                  maximum: 100
                nama_usaha:
                  type: string
                pemilik:
                  type: string
                email:
                  type: string
                  format: email
                no_hp:
                  type: string
                kota:
                  type: string
                deskripsi:
                  type: string
                kategori_usaha:
                  type: array
                  items:
                    type: string
                foto_url:
                  type: string
                  nullable: true
                cover_url:
                  type: string
                  nullable: true
                internal_notes:
                  type: string
            example:
              komisi_persen: 12
              internal_notes: Awaiting QRIS verification.
      responses:
        '200':
          description: Updated artisan
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Artisan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/artisan/{id}/status:
    patch:
      operationId: patchArtisanStatus
      tags: [artisan-management]
      summary: Update artisan status (admin only)
      description: |
        **Dual update required:** `app_metadata.status` in Supabase Auth (Admin SDK)
        AND `status` in `artisans` table, atomically.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [aktif, suspended, rejected]
            example:
              status: aktif
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/artisan/{id}/events:
    get:
      operationId: listArtisanEvents
      tags: [artisan-management]
      summary: List events an artisan has joined (admin, read-only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Events list (event rows the artisan has joined)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ArtisanEventEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/artisan/{id}/kas:
    get:
      operationId: getArtisanKas
      tags: [artisan-management]
      summary: Get artisan cashflow (admin, read-only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Kas list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Kas'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/artisan/{id}/riwayat:
    get:
      operationId: getArtisanRiwayat
      tags: [artisan-management]
      summary: Get artisan transaction history (admin, read-only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Riwayat list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Riwayat'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/artisan/{id}/promo:
    get:
      operationId: getArtisanPromo
      tags: [artisan-management]
      summary: Get artisan promos (admin, read-only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Promo list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Promo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/artisan/{id}/stok:
    get:
      operationId: getArtisanStok
      tags: [artisan-management]
      summary: Get artisan inventory (admin, read-only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Stok list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Stok'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/artisan/{id}/qris:
    get:
      operationId: getArtisanQris
      tags: [artisan-management]
      summary: Get artisan QRIS URL (admin, read-only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: QRIS info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          qris_url:
                            type: string
                            nullable: true
                          updated_at:
                            type: string
                            format: date-time
                            nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── Aktivitas (Admin Story Moderation) ────────────────────────────────────────

  /api/aktivitas:
    get:
      operationId: listAktivitas
      tags: [aktivitas]
      summary: List all stories across all kolaborators (admin moderation feed, admin only)
      description: |
        Admin moderation cross-author story feed.
        Vocabulary: `aktivitas` (NEVER `admin/stories`).
        Returns stories with `kolaborator_id` and `nama` embedded.
      parameters:
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Story list with author info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          allOf:
                            - $ref: '#/components/schemas/Story'
                            - type: object
                              properties:
                                kolaborator_id:
                                  type: string
                                nama:
                                  type: string
              example:
                status: success
                message: null
                data:
                  - id: sto-0001
                    konten: Workshop batik di Yogya
                    media_url: null
                    tags: [batik]
                    like_count: 5
                    status: aktif
                    created_at: '2026-04-01T08:00:00.000Z'
                    kolaborator_id: kol-0001
                    nama: Sari Wulandari
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/aktivitas/{id}:
    delete:
      operationId: deleteAktivitas
      tags: [aktivitas]
      summary: Soft-delete a story (sets status='dihapus', admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Soft-deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Story dihapus
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Company Profile Management ─────────────────────────────────────────────────

  /api/company-profile:
    get:
      operationId: getCompanyProfileAdmin
      tags: [company-profile]
      summary: Get company profile section content (admin only)
      description: Same source as public `/api/public/company-profile`. Admin sees raw JSONB.
      parameters:
        - name: section
          in: query
          required: true
          schema:
            type: string
            enum: [home, about, tim, programs, works, gallery]
      responses:
        '200':
          description: Section content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      operationId: saveCompanyProfile
      tags: [company-profile]
      summary: Save company profile section content (admin only)
      description: Upserts `(section, content)`. Shape of content is FE-driven opaque JSONB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [section, content]
              properties:
                section:
                  type: string
                  enum: [home, about, tim, programs, works, gallery]
                content:
                  description: >-
                    Opaque JSONB — shape decided by FE per section. Object-shaped
                    sections (home/about/tim/gallery) send an object; list-shaped
                    sections (programs/works) send a bare JSON array. Stored verbatim.
                  oneOf:
                    - type: object
                      additionalProperties: true
                    - type: array
            example:
              section: home
              content:
                hero_title: Ruang Kreatif Banyumas
                hero_subtitle: Wadah kolaborasi artisan dan kolaborator lokal
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Company profile berhasil disimpan
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Zones ─────────────────────────────────────────────────────────────────────

  /api/zones:
    get:
      operationId: listZonesGlobal
      tags: [zones]
      summary: List global venue zone layout (admin only)
      description: Returns zone layout without per-event occupied state.
      responses:
        '200':
          description: Zone list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ZoneGlobalLayout'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      operationId: saveZonesGlobal
      tags: [zones]
      summary: Replace global venue zone layout (admin only)
      description: Replaces entire layout. Backend validates no occupied stand is removed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [zones]
              properties:
                zones:
                  type: array
                  items:
                    $ref: '#/components/schemas/ZoneGlobalLayout'
      responses:
        '200':
          description: Layout saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Layout zona berhasil disimpan
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /api/events/{id}/zones:
    get:
      operationId: listEventZones
      tags: [zones]
      summary: List zone layout with per-event occupied state (admin + artisan)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Zone layout with occupied state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ZoneEventOccupancy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/events/{id}/artisan/{aid}/stand:
    post:
      operationId: assignStand
      tags: [zones]
      summary: Assign a stand to artisan in event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Event ID
        - name: aid
          in: path
          required: true
          schema:
            type: string
          description: Artisan ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stand_id]
              properties:
                stand_id:
                  type: string
                  description: Stand ID (e.g. 'A-3')
                  example: A-3
            example:
              stand_id: A-3
      responses:
        '200':
          description: Stand assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
              example:
                status: success
                message: Stand A-3 berhasil ditetapkan
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ── Notifikasi (Shared) ─────────────────────────────────────────────────────

  /api/notifikasi:
