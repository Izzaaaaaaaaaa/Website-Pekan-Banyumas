    Notifikasi:
      type: object
      required: [id, type, title, message, read, created_at]
      properties:
        id:
          type: string
          example: notif-0001
        type:
          type: string
          description: |
            Admin type taxonomy:
            artisan_request, kolaborator_approved, event_published, aktivitas_flagged, system.
            Safe to add new types without FE changes.
          example: artisan_request
        title:
          type: string
          description: Notification title
          example: Permintaan Artisan Baru
        message:
          type: string
          description: Notification body text
          example: Tenun Serayu mengajukan permintaan bergabung ke Peken Banyumas #7.
        read:
          type: boolean
          description: Read flag. NOT 'dibaca'.
          example: false
        link:
          type: string
          nullable: true
          description: Optional deep-link path
          example: /events/evt-0001
        detail:
          type: object
          nullable: true
          description: Arbitrary metadata (type-specific)
          example: null
        created_at:
          type: string
          format: date-time
          description: UTC ISO 8601
          example: '2026-04-28T10:00:00.000Z'
