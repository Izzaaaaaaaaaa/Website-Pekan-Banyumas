  /api/kolaborator/{id}/stories:
    get:
      operationId: listKolaboratorStoriesAdmin
      tags: [kolaborator-management]
      summary: List kolaborator stories (admin view, admin only)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Story list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Story'
        '401':
