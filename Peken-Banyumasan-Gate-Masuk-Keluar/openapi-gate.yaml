        label:
          type: string
          example: Zona A – Kriya & Fashion
        warna:
          type: string
          example: '#8B5E3C'
        urutan:
          type: integer
          description: Display order
          example: 1
        stands:
          type: array
          items:
            type: object
            required: [id, label, kategori]
            properties:
              id:
                type: string
                example: A-1
              label:
                type: string
                example: Stand A-1
              kategori:
                type: string
                example: Kriya

    ZoneEventOccupancy:
      type: object
      description: |
        Per-event zone occupancy (used by GET /api/events/{id}/zones).
        Backend joins zones with event_artisans WHERE status_request='approved'
        OR pending (for orange overlay in FE ZoneSelector).
      required: [zona, label, warna, stands]
      properties:
        zona:
          type: string
          example: A
        label:
          type: string
          example: Zona A – Kriya & Fashion
        warna:
          type: string
          example: '#8B5E3C'
        stands:
          type: array
          items:
            type: object
            required: [id, occupied]
            properties:
              id:
                type: string
                example: A-1
              label:
                type: string
              kategori:
                type: string
              occupied:
                type: boolean
                description: True if stand has approved or pending artisan
              artisan_id:
                type: string
                description: Present when occupied
              nama_usaha:
                type: string
                description: Present when occupied
              status_request:
                type: string
                enum: [approved, pending, pending_change]
                description: For UI pending overlay (orange in ZoneSelector)

    Kas:
      type: object
      required: [id, jenis, kategori, metode, nominal, tgl]
      description: Read-only view of artisan cash flow (admin sees, cannot edit)
      properties:
        id:
          type: string
          example: kas-0001
        jenis:
          type: string
          enum: [masuk, keluar]
          description: Cash flow direction
          example: masuk
        kategori:
          type: string
          description: Transaction category
          example: Penjualan
        pelanggan:
          type: string
          nullable: true
          example: Ibu Sari
        barang:
          type: string
          nullable: true
          example: Kain Batik Cap
        qty:
          type: number
          example: 2
        metode:
          type: string
          enum: [tunai, qris]
          description: Payment method — strict whitelist per DB CHECK
          example: qris
        ket:
          type: string
          description: Notes/remarks
          example: Pesanan reguler
        nominal:
          type: number
          description: Amount in rupiah
          example: 300000
        tgl:
          type: string
          format: date
          description: WIB local date YYYY-MM-DD
          example: '2026-04-28'
        saldo_after:
          type: number
          description: Computed running balance (rupiah)
          example: 1500000
        bukti_url:
          type: string
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          description: UTC ISO 8601, set on INSERT
          example: '2026-04-01T08:00:00.000Z'
        updated_at:
          type: string
          format: date-time
          description: UTC ISO 8601, auto-set by set_updated_at trigger on UPDATE
          example: '2026-04-15T10:30:00.000Z'

    Riwayat:
      type: object
      required: [id, pelanggan, barang, qty, total, metode, tgl]
      description: Read-only view of artisan sales history
      properties:
        id:
          type: string
          example: rwy-0001
        pelanggan:
          type: string
          description: Customer name
          example: Ibu Sari
