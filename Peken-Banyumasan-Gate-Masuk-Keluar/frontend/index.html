<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <title>Peken Banyumasan</title>

  <!-- Font loading, all via CDN for smaller bundle:
       - Clash Display  → Fontshare (display + labels)
       - Playfair Disp. → Google Fonts (italic serif accent)
       - Montserrat     → Google Fonts (body, was ~7MB self-hosted TTF
                          in v1.8; now the exact same Julieta Ulanovsky
                          variable font served from Google's CDN) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link
    rel="stylesheet"
    href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@1,400&display=swap"
  />

  <style>
    /* These three rules were inline in the original Peken Banyumasan.html.
       Kept verbatim so page-level defaults match exactly. */
    html, body { background: var(--bg-page); }
    em { font-style: italic; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
